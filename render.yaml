services:
  - type: web
    name: clinic-ai-backend
    env: python
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.15
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
